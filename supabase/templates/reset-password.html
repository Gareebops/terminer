<!-- Supabase Auth šablon: Reset password (nalepiti u Dashboard →
     Authentication → Email Templates → Reset password).
     Naslov (subject): Promena lozinke - Terminer -->
<!doctype html>
<html lang="sr">
<body style="margin:0;padding:24px 12px;background:#E4E9E0;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <div style="max-width:520px;margin:0 auto;">
    <div style="background:#ffffff;border-radius:16px;padding:32px;">
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 16px;">
        <tr>
          <td style="vertical-align:middle;">
            <img src="https://terminer.rs/apple-icon.png" alt="Terminer" width="36" height="36" style="display:block;border:0;" />
          </td>
          <td style="vertical-align:middle;padding-left:10px;font-size:18px;font-weight:800;color:#17181A;letter-spacing:-0.02em;">
            Terminer
          </td>
        </tr>
      </table>
      <h1 style="margin:8px 0 4px;font-size:22px;color:#17181A;">Promena lozinke</h1>
      <p style="margin:0 0 24px;font-size:14px;color:#52525b;line-height:1.6;">
        Stigao je zahtev za promenu lozinke tvog Terminer naloga. Klikni na
        dugme ispod da postaviš novu lozinku.
      </p>
      <a href="{{ .ConfirmationURL }}"
         style="display:inline-block;background:#17181A;color:#ffffff;font-size:14px;font-weight:600;padding:12px 28px;border-radius:999px;text-decoration:none;">
        Postavi novu lozinku
      </a>
      <p style="margin:24px 0 0;font-size:12px;color:#a1a1aa;line-height:1.6;">
        Ako nisi ti tražio promenu, ignoriši ovaj mejl - lozinka ostaje ista.
      </p>
    </div>
    <p style="margin:16px 0 0;text-align:center;font-size:12px;color:#a1a1aa;">
      <a href="https://terminer.rs" style="color:#a1a1aa;">terminer.rs</a> - sajt i online zakazivanje za salone
    </p>
  </div>
</body>
</html>
